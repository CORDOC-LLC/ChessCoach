name: GemmaChess

options:
  bundleIdPrefix: com.cordoc
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  GemmaChessCore:
    path: .

settings:
  base:
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  # iOS app — single-column, board-first UI (U22). Thin shell over GemmaChessCore.
  GemmaChess:
    type: application
    platform: iOS
    sources:
      - path: Apps/GemmaChessiOS
    dependencies:
      - package: GemmaChessCore
        product: GemmaChessCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cordoc.gemmachess
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: ChessCoach
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"

  # macOS app — multi-column NavigationSplitView UI (U22).
  GemmaChessMac:
    type: application
    platform: macOS
    sources:
      - path: Apps/GemmaChessMac
    dependencies:
      - package: GemmaChessCore
        product: GemmaChessCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cordoc.gemmachess.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: ChessCoach
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.board-games"
        ENABLE_HARDENED_RUNTIME: "YES"
